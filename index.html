<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BobEnglish - Hệ thống học tập trực tuyến</title>
    
    <!-- Core Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #f8fafc;
            min-height: 100vh;
            margin: 0;
            -webkit-tap-highlight-color: transparent;

            /* CẤP ĐỘ 3: Chặn bôi đen văn bản trên toàn trang */
            -webkit-user-select: none; /* Safari */
            -ms-user-select: none; /* IE 10 and IE 11 */
            user-select: none; /* Standard syntax */
        }

        .glass-nav {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .animate-fade-up { animation: fadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .lesson-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        @media (hover: hover) {
            .lesson-card:hover {
                transform: translateY(-5px);
                box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
            }
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="text-slate-900">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        // --- 1. FIREBASE IMPORTS ---
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const { useState, useEffect, useRef } = React;

        // CẤU HÌNH FIREBASE CỦA BẠN (Đã thêm vào code)
        let firebaseConfig = {
            apiKey: "AIzaSyCXiTxbtv7AEW0LbE52XlYkY5g8ngURXEA",
            authDomain: "bobenglish-database.firebaseapp.com",
            projectId: "bobenglish-database",
            storageBucket: "bobenglish-database.firebasestorage.app",
            messagingSenderId: "699100969311",
            appId: "1:699100969311:web:037c2178ac66ad93a85eea"
        };

        // Hỗ trợ hiển thị trên nền tảng tích hợp
        if (typeof __firebase_config !== 'undefined') {
            firebaseConfig = JSON.parse(__firebase_config);
        }
        
        // Khởi tạo Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const customAppId = typeof __app_id !== 'undefined' ? __app_id : 'bob-english-v4';

        // --- 2. COMPONENTS ---
        // SỬA LỖI: Sử dụng thẻ bọc (wrapper span) để ngăn React xung đột
        const Icon = ({ name, size = 20, className = "" }) => {
            const containerRef = useRef(null);
            
            useEffect(() => {
                if (window.lucide && containerRef.current) {
                    // Reset thẻ i bên trong trước để Lucide render
                    containerRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({
                        nameAttr: 'data-lucide',
                        attrs: { 
                            class: className,
                            width: size,
                            height: size
                        }
                    });
                }
            }, [name, className, size]);

            return <span ref={containerRef} style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }}></span>;
        };

        // --- 3. MAIN APP ---
        function App() {
            const [user, setUser] = useState(null); // Trạng thái đăng nhập
            const [fbUser, setFbUser] = useState(null); // Trạng thái kết nối Cloud
            const [fbError, setFbError] = useState(''); // Lưu lỗi kết nối Firebase nếu có
            
            const [usersList, setUsersList] = useState([
                { id: 'admin_root', username: 'admin', password: '123', role: 'admin', name: 'Quản trị viên' }
            ]);

            const [error, setError] = useState('');

            // Khởi tạo xác thực Firebase một lần duy nhất
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (err) { 
                        console.error("Lỗi xác thực Firebase:", err); 
                        if (err.code === 'auth/operation-not-allowed') {
                            setFbError('Chưa bật Authentication (Anonymous) trên Firebase!');
                        } else {
                            setFbError('Lỗi kết nối. Vui lòng chạy trên Vercel/Localhost thay vì mở file HTML trực tiếp.');
                        }
                    }
                };
                initAuth();

                const unsubscribeAuth = onAuthStateChanged(auth, (u) => { 
                    setFbUser(u); 
                });
                return () => unsubscribeAuth();
            }, []);

            // Lắng nghe dữ liệu danh sách học viên từ Đám mây (Firestore)
            useEffect(() => {
                if (!fbUser) return;

                const usersRef = collection(db, 'artifacts', customAppId, 'public', 'data', 'students');
                const unsubscribeDB = onSnapshot(usersRef, 
                    (snapshot) => {
                        const loadedStudents = [];
                        snapshot.forEach(doc => loadedStudents.push({ id: doc.id, ...doc.data() }));
                        setUsersList([
                            { id: 'admin_root', username: 'admin', password: '123', role: 'admin', name: 'Quản trị viên' },
                            ...loadedStudents
                        ]);
                    }, 
                    (err) => console.error("Lỗi khi tải dữ liệu Cloud:", err)
                );
                
                return () => unsubscribeDB();
            }, [fbUser]);

            const handleLogin = (u, p) => {
                const found = usersList.find(x => x.username.toLowerCase() === u.trim().toLowerCase() && x.password === p.trim());
                if (found) {
                    setUser(found);
                    setError('');
                } else {
                    setError("Tài khoản hoặc mật khẩu không đúng.");
                }
            };

            return (
                <div className="min-h-screen pb-10">
                    {!user ? (
                        <LoginScreen onLogin={handleLogin} error={error} fbUser={fbUser} />
                    ) : (
                        <div className="animate-fade-up">
                            {/* Navigation Bar */}
                            <nav className="glass-nav sticky top-0 z-50 border-b border-slate-200/60 px-4 sm:px-6 h-16 flex items-center justify-between">
                                <div className="flex items-center gap-2">
                                    <div className="w-9 h-9 bg-indigo-600 rounded-lg flex items-center justify-center text-white shadow-lg">
                                        <Icon name="graduation-cap" size={20} />
                                    </div>
                                    <span className="text-xl font-black text-indigo-600 tracking-tight">BobEnglish</span>
                                </div>
                                <div className="flex items-center gap-3">
                                    <div className="text-right hidden xs:block">
                                        <p className="text-xs font-bold leading-none">{user.name}</p>
                                        <p className="text-[9px] uppercase font-black text-indigo-500 mt-1">{user.role}</p>
                                    </div>
                                    <button onClick={() => setUser(null)} className="w-9 h-9 flex items-center justify-center bg-slate-100 text-slate-500 rounded-xl hover:bg-red-50 hover:text-red-500 transition-colors">
                                        <Icon name="log-out" size={16} />
                                    </button>
                                </div>
                            </nav>

                            <main className="max-w-5xl mx-auto p-4 sm:p-6 lg:p-8">
                                {user.role === 'admin' ? (
                                    <AdminPanel users={usersList} fbUser={fbUser} fbError={fbError} />
                                ) : (
                                    <StudentHub user={user} />
                                )}
                            </main>
                        </div>
                    )}
                </div>
            );
        }

        const LoginScreen = ({ onLogin, error, fbUser, fbError }) => {
            const [u, setU] = useState('');
            const [p, setP] = useState('');

            return (
                <div className="min-h-screen flex items-center justify-center p-4 bg-slate-50">
                    <div className="w-full max-w-sm animate-fade-up">
                        <div className="bg-white p-8 rounded-[2rem] shadow-xl border border-white relative">
                            {/* Trạng thái Server */}
                            <div className="absolute top-4 right-4 flex items-center gap-2" title={fbError || "Đã kết nối máy chủ"}>
                                <div className={`w-2 h-2 rounded-full ${fbUser ? 'bg-green-500 animate-pulse' : 'bg-red-400'}`}></div>
                                <span className="text-[9px] font-bold text-slate-400 uppercase tracking-widest">{fbUser ? 'Online' : 'Offline'}</span>
                            </div>

                            <div className="text-center mb-8 mt-2">
                                <div className="w-14 h-14 bg-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-4 text-white shadow-lg">
                                    <Icon name="zap" size={28} />
                                </div>
                                <h1 className="text-2xl font-black text-slate-800">Chào bạn!</h1>
                                <p className="text-slate-400 text-sm">Học tập hiệu quả cùng BobEnglish</p>
                            </div>
                            
                            <form onSubmit={e => { e.preventDefault(); onLogin(u, p); }} className="space-y-4">
                                {error && (
                                    <div className="p-3 bg-red-50 text-red-600 text-xs font-bold rounded-xl border border-red-100 flex items-center gap-2">
                                        <Icon name="alert-circle" size={14} /> {error}
                                    </div>
                                )}
                                <div className="space-y-1">
                                    <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Tài khoản</label>
                                    <input type="text" value={u} onChange={e=>setU(e.target.value)} className="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:border-indigo-500 focus:bg-white transition-all text-sm" placeholder="Tên đăng nhập..." required />
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Mật khẩu</label>
                                    <input type="password" value={p} onChange={e=>setP(e.target.value)} className="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:border-indigo-500 focus:bg-white transition-all text-sm" placeholder="••••••••" required />
                                </div>
                                <button className="w-full py-4 bg-indigo-600 text-white font-black rounded-2xl shadow-lg hover:bg-indigo-700 active:scale-95 transition-all uppercase text-xs tracking-[0.2em] mt-2">
                                    Đăng nhập
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            );
        };

        const AdminPanel = ({ users, fbUser, fbError }) => {
            const [n, setN] = useState('');
            const [u, setU] = useState('');
            const [p, setP] = useState('');
            const [confirmDeleteId, setConfirmDeleteId] = useState(null);

            const students = users.filter(x => x.role === 'student');

            const handleAdd = async (e) => {
                e.preventDefault();
                if (!fbUser) {
                    return alert("Chưa kết nối Cloud!\nLý do: " + (fbError || "Đang tải dữ liệu..."));
                }

                const newId = 'stu_' + Date.now();
                const newUser = { name: n, username: u.trim().toLowerCase(), password: p, role: 'student' };
                
                // Đẩy dữ liệu lên Cloud Firestore
                try {
                    const docRef = doc(db, 'artifacts', customAppId, 'public', 'data', 'students', newId);
                    await setDoc(docRef, newUser);
                    setN(''); setU(''); setP('');
                } catch (err) {
                    console.error("Lỗi khi thêm học viên:", err);
                }
            };

            const handleDelete = async (id) => {
                if (!fbUser) return;
                
                try {
                    const docRef = doc(db, 'artifacts', customAppId, 'public', 'data', 'students', id);
                    await deleteDoc(docRef);
                } catch (err) {
                    console.error("Lỗi xóa học viên:", err);
                }
                setConfirmDeleteId(null);
            };

            return (
                <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                    {/* Add User Form */}
                    <div className="lg:col-span-5 order-2 lg:order-1">
                        <div className="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm">
                            <h3 className="font-black text-lg mb-6 flex items-center gap-3">
                                <div className="p-2 bg-indigo-50 text-indigo-600 rounded-lg"><Icon name="user-plus" size={18} /></div>
                                THÊM HỌC VIÊN
                            </h3>
                            <form onSubmit={handleAdd} className="space-y-4">
                                <div className="space-y-1">
                                    <label className="text-[9px] font-black text-slate-400 uppercase tracking-widest ml-2">Tên học viên</label>
                                    <input placeholder="Họ và tên..." value={n} onChange={e=>setN(e.target.value)} className="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:border-indigo-500 text-sm" required />
                                </div>
                                <div className="grid grid-cols-2 gap-3">
                                    <div className="space-y-1">
                                        <label className="text-[9px] font-black text-slate-400 uppercase tracking-widest ml-2">Tài khoản</label>
                                        <input placeholder="Username" value={u} onChange={e=>setU(e.target.value)} className="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:border-indigo-500 text-sm" required />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[9px] font-black text-slate-400 uppercase tracking-widest ml-2">Mật khẩu</label>
                                        <input placeholder="Mật khẩu" value={p} onChange={e=>setP(e.target.value)} className="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:border-indigo-500 text-sm" required />
                                    </div>
                                </div>
                                <button className="w-full py-4 bg-indigo-600 text-white font-bold rounded-2xl hover:bg-indigo-700 active:scale-95 transition-all text-sm shadow-lg shadow-indigo-100">
                                    Lưu lên Đám mây
                                </button>
                            </form>
                        </div>
                    </div>

                    {/* User List */}
                    <div className="lg:col-span-7 order-1 lg:order-2">
                        <div className="bg-white rounded-[2rem] border border-slate-100 shadow-sm overflow-hidden flex flex-col h-[500px]">
                            <div className="p-4 bg-slate-50/50 border-b flex justify-between items-center">
                                <div className="flex items-center gap-2">
                                    <Icon name="users" size={14} className="text-slate-400" />
                                    <span className="font-black uppercase tracking-widest text-slate-400 text-[10px]">Danh sách (Cloud)</span>
                                </div>
                                <span className="bg-indigo-600 text-white px-3 py-1 rounded-full text-[9px] font-black">{students.length} tài khoản</span>
                            </div>
                            <div className="flex-1 overflow-y-auto custom-scrollbar p-3 space-y-2">
                                {students.length === 0 ? (
                                    <div className="h-full flex flex-col items-center justify-center opacity-20">
                                        <Icon name="user-x" size={48} />
                                        <p className="font-bold text-xs mt-2">Chưa có dữ liệu</p>
                                    </div>
                                ) : students.map(s => (
                                    <div key={s.id} className="p-4 flex justify-between items-center bg-white border border-slate-50 rounded-2xl hover:bg-slate-50 transition-colors">
                                        <div className="flex items-center gap-3">
                                            <div className="w-10 h-10 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center font-black text-sm">{s.name.charAt(0)}</div>
                                            <div>
                                                <p className="font-bold text-sm text-slate-800">{s.name}</p>
                                                <p className="text-[10px] font-mono text-slate-400">U: {s.username} | P: {s.password}</p>
                                            </div>
                                        </div>
                                        <button 
                                            onClick={() => {
                                                if (confirmDeleteId === s.id) {
                                                    handleDelete(s.id);
                                                } else {
                                                    setConfirmDeleteId(s.id);
                                                    setTimeout(() => setConfirmDeleteId(null), 3000); // Tự hủy nút Xác nhận sau 3s
                                                }
                                            }} 
                                            className={`h-8 px-2 flex items-center justify-center rounded-lg transition-colors ${confirmDeleteId === s.id ? 'bg-red-500 text-white' : 'text-slate-300 hover:text-red-500'}`}
                                        >
                                            {confirmDeleteId === s.id ? <span className="text-[10px] font-bold">Xóa?</span> : <Icon name="trash-2" size={16} />}
                                        </button>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <!-- CẤP ĐỘ 3: Script phòng thủ chặn F12, chuột phải, xem mã nguồn -->
    <script>
        // 1. Chặn click chuột phải
        document.addEventListener('contextmenu', event => event.preventDefault());

        // 2. Chặn các phím tắt nguy hiểm
        document.onkeydown = function(e) {
            // Chặn F12
            if(e.keyCode == 123) {
                return false;
            }
            // Chặn Ctrl+Shift+I (Mở DevTools)
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) {
                return false;
            }
            // Chặn Ctrl+Shift+C (Inspect Element)
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) {
                return false;
            }
            // Chặn Ctrl+Shift+J (Mở Console)
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) {
                return false;
            }
            // Chặn Ctrl+U (Xem Source code)
            if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) {
                return false;
            }
        }
    </script>
</body>
</html>
